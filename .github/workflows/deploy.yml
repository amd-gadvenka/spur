name: Build and Deploy Spur

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'   # check upstream every 30 min

env:
  IMAGE: ${{ secrets.REGISTRY }}/spur

jobs:
  # ── 1. Build the Docker image ─────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: self-hosted
    if: github.event_name != 'schedule'
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "value=${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.value }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Kubernetes ───────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K8S_SSH_PRIVATE_KEY }}

      - name: Trust the k8s host
        run: ssh-keyscan -H ${{ secrets.K8S_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Patch image tag in manifests
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          find deploy/k8s -name '*.yaml' | xargs sed -i \
            "s|image: spur:latest|image: ${IMAGE_TAG}|g"

      - name: Copy manifests to server
        env:
          HOST: ${{ secrets.K8S_SSH_HOST }}
          USER: ${{ secrets.K8S_SSH_USER }}
        run: |
          ssh ${USER}@${HOST} "mkdir -p /tmp/spur-deploy/k8s"
          scp -r deploy/k8s/* ${USER}@${HOST}:/tmp/spur-deploy/k8s/

      - name: Rebuild CRD generator on server
        env:
          HOST: ${{ secrets.K8S_SSH_HOST }}
          USER: ${{ secrets.K8S_SSH_USER }}
        run: |
          ssh ${USER}@${HOST} bash -s << 'ENDSSH'
            cd ~/spur
            git pull origin main
            cargo build --release --bin spur-k8s-operator
          ENDSSH

      - name: Deploy on k8s node
        env:
          HOST: ${{ secrets.K8S_SSH_HOST }}
          USER: ${{ secrets.K8S_SSH_USER }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          ssh ${USER}@${HOST} bash -s << 'ENDSSH'
            set -euo pipefail
            DEPLOY_DIR=/tmp/spur-deploy

            echo "==> 1. Namespace"
            kubectl apply -f $DEPLOY_DIR/k8s/namespace.yaml

            echo "==> 2. RBAC"
            kubectl apply -f $DEPLOY_DIR/k8s/rbac.yaml

            echo "==> 3. SpurJob CRD"
            ~/spur/target/release/spur-k8s-operator generate-crd | kubectl apply -f -

            echo "==> 4. ConfigMap"
            kubectl apply -f $DEPLOY_DIR/k8s/configmap.yaml

            echo "==> 5. Accounting daemon"
            kubectl apply -f $DEPLOY_DIR/k8s/spurdbd.yaml

            echo "==> 6. Controller + PDB"
            kubectl apply -f $DEPLOY_DIR/k8s/spurctld.yaml
            kubectl apply -f $DEPLOY_DIR/k8s/pdb.yaml
            kubectl rollout status statefulset/spurctld -n spur --timeout=180s

            echo "==> 7. REST API"
            kubectl apply -f $DEPLOY_DIR/k8s/spurrestd.yaml

            echo "==> 8. Operator"
            kubectl apply -f $DEPLOY_DIR/k8s/operator.yaml
            kubectl rollout status deployment/spur-k8s-operator -n spur --timeout=120s

            echo "==> Done. Current state:"
            kubectl get all -n spur

            echo "==> Verify: Raft leader election"
            kubectl logs -n spur spurctld-0 | grep -i leader || echo "No leader log yet"

            echo "==> Verify: Operator node registration"
            kubectl logs -n spur deploy/spur-k8s-operator | grep -i register || echo "No registration log yet"

            echo "==> Verify: Health checks"
            kubectl port-forward -n spur deploy/spur-k8s-operator 8080:8080 &
            PF_PID=$!
            sleep 3
            curl -sf http://localhost:8080/healthz && echo "healthz OK" || echo "healthz FAILED"
            curl -sf http://localhost:8080/readyz && echo "readyz OK" || echo "readyz FAILED"
            kill $PF_PID
          ENDSSH

  # ── 3. Sync from upstream ROCm/spur ──────────────────────────
  sync-upstream:
    name: Sync from ROCm/spur
    runs-on: self-hosted
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add upstream https://github.com/ROCm/spur.git 2>/dev/null || git remote set-url upstream https://github.com/ROCm/spur.git
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/amd-gadvenka/spur.git
          git fetch upstream main
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Already up to date, no deploy needed."
            exit 0
          fi
          git merge upstream/main --no-edit
          git push origin main
